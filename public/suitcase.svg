  <circle cx="40" cy="118" r="5" fill="#F5B800" stroke="#222" stroke-width="2.5"/>
  <!-- Right wheel (red, behind) -->
  <circle cx="78" cy="122" r="5" fill="#CC2200" stroke="#222" stroke-width="2.5"/>
